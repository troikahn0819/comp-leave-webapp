<!DOCTYPE html>
<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>보상휴가 자동계산 웹앱 - 로그인</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "background": "#faf8ff",
                    "outline-variant": "#c2c6d8",
                    "primary": "#0050cb",
                    "on-surface": "#191b24",
                    "primary-fixed-dim": "#b3c5ff",
                    "primary-fixed": "#dae1ff",
                    "on-primary-container": "#f8f7ff",
                    "on-surface-variant": "#424656",
                    "surface-bright": "#faf8ff",
                    "secondary": "#5c5f61",
                    "outline": "#727687",
                    "surface": "#faf8ff",
                    "surface-container-low": "#f2f3ff",
                    "surface-container": "#ecedfa",
                    "primary-container": "#0066ff",
                    "on-primary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a"
                },
                "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
                },
                "spacing": {
                    "lg": "24px", "xs": "4px", "md": "16px", "xl": "32px", "sm": "8px"
                },
                "fontFamily": {
                    "headline-lg": ["Hanken Grotesk"],
                    "headline-sm": ["Hanken Grotesk"],
                    "body-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "label-md": ["Inter"],
                    "label-sm": ["Inter"]
                },
                "fontSize": {
                    "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                    "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                    "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                    "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                    "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                    "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                    "label-sm": ["11px", { "lineHeight": "14px", "letterSpacing": "0.03em", "fontWeight": "500" }]
                }
            }
        }
    }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .icon-fill { font-variation-settings: 'FILL' 1; }
</style>
<!-- 이미 인증된 상태면 대시보드로 바로 이동 -->
<script src="auth.js"></script>
<script>
    if (window.AppAuth && AppAuth.isAuthed()) { location.replace('index.html'); }
</script>
</head>
<body class="bg-background text-on-surface font-body-md antialiased min-h-screen flex items-center justify-center p-md">
<main class="w-full max-w-sm">
<!-- Brand -->
<div class="flex flex-col items-center text-center mb-lg">
<div class="w-14 h-14 rounded-xl bg-primary-container text-on-primary-container flex items-center justify-center mb-md shadow-[0_4px_16px_-4px_rgba(0,102,255,0.4)]">
<span class="material-symbols-outlined text-3xl">event_available</span>
</div>
<h1 class="text-headline-lg font-headline-lg text-on-surface">보상휴가 자동계산 웹앱</h1>
<p class="text-body-md font-body-md text-on-surface-variant mt-xs">계속하려면 비밀번호를 입력하세요.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-[0_2px_12px_-4px_rgba(25,27,36,0.08)]">
<form id="login-form" class="space-y-md" autocomplete="off">
<div>
<label for="password" class="block text-label-md font-label-md text-on-surface-variant mb-sm">비밀번호</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input id="password" name="password" type="password" inputmode="text" autocomplete="current-password"
       class="w-full rounded-lg border-outline-variant bg-surface pl-10 pr-11 py-2.5 text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-outline"
       placeholder="비밀번호 입력" autofocus />
<button type="button" id="toggle-visibility" aria-label="비밀번호 표시"
        class="absolute right-2 top-1/2 -translate-y-1/2 p-1 rounded text-outline hover:text-on-surface hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[20px]" id="toggle-icon">visibility</span>
</button>
</div>
<p id="error-msg" class="hidden mt-sm text-body-sm text-error flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">error</span>
<span>비밀번호가 올바르지 않습니다.</span>
</p>
</div>
<button type="submit"
        class="w-full bg-primary text-on-primary font-label-md text-label-md rounded-lg py-3 flex items-center justify-center gap-2 hover:bg-[#0066ff] transition-colors">
<span class="material-symbols-outlined text-[18px]">login</span>
<span>로그인</span>
</button>
</form>
</div>
<p class="text-center text-label-sm font-label-sm text-on-surface-variant mt-md">인가된 사용자만 접근할 수 있습니다.</p>
</main>
<script>
  (function () {
    var form = document.getElementById('login-form');
    var input = document.getElementById('password');
    var errorMsg = document.getElementById('error-msg');
    var toggle = document.getElementById('toggle-visibility');
    var toggleIcon = document.getElementById('toggle-icon');

    toggle.addEventListener('click', function () {
      var show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      toggleIcon.textContent = show ? 'visibility_off' : 'visibility';
      input.focus();
    });

    input.addEventListener('input', function () {
      errorMsg.classList.add('hidden');
      input.classList.remove('border-error', 'ring-1', 'ring-error');
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (AppAuth.login(input.value)) {
        location.replace('index.html');
      } else {
        errorMsg.classList.remove('hidden');
        input.classList.add('border-error', 'ring-1', 'ring-error');
        input.value = '';
        input.focus();
      }
    });
  })();
</script>
</body></html>
